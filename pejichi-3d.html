<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Pejichi 3D Scene</title>\n    <style>\n        body { margin: 0; }\n        canvas { display: block; }\n    </style>\n    <script src="https://threejs.org/build/three.js"></script>\n    <script src="https://threejs.org/examples/js/controls/OrbitControls.js"></script>\n</head>\n<body>\n    <script>\n        // Scene setup\n        const scene = new THREE.Scene();\n        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);\n        const renderer = new THREE.WebGLRenderer();\n        renderer.setSize(window.innerWidth, window.innerHeight);\n        document.body.appendChild(renderer.domElement);\n\n        // Ocean environment\n        const waterGeometry = new THREE.PlaneGeometry(10000, 10000);\n        const waterMaterial = new THREE.MeshPhongMaterial({ color: 0x1E90FF, opacity: 0.7, transparent: true });\n        const water = new THREE.Mesh(waterGeometry, waterMaterial);\n        water.rotation.x = - Math.PI / 2;\n        scene.add(water);\n\n        // Lighting\n        const ambientLight = new THREE.AmbientLight(0x404040); // soft white light\n        scene.add(ambientLight);\n\n        const pointLight = new THREE.PointLight(0xffffff, 1, 100);\n        pointLight.position.set(50, 50, 50);\n        scene.add(pointLight);\n\n        // Pejichi fish model (for demo purpose, we'll create a simple sphere)\n        const fishGeometry = new THREE.SphereGeometry(1, 32, 32);\n        const fishMaterial = new THREE.MeshStandardMaterial({ color: 0xFF4500 }); // Pejichi fish color\n        const fish = new THREE.Mesh(fishGeometry, fishMaterial);\n        scene.add(fish);\n\n        // Fish movement\n        fish.position.y = 1;\n        let direction = new THREE.Vector3(0, 0, 0);\n        function animate() {\n            requestAnimationFrame(animate);\n            fish.position.x += direction.x;\n            fish.position.z += direction.z;\n            if (fish.position.x > 10 || fish.position.x < -10) direction.x *= -1;\n            if (fish.position.z > 10 || fish.position.z < -10) direction.z *= -1;\n            renderer.render(scene, camera);\n        }\n\n        // Orbit controls\n        const controls = new THREE.OrbitControls(camera, renderer.domElement);\n        camera.position.z = 5;\n        animate();\n    </script>\n</body>\n</html>
